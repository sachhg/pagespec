<html>

<head>

            margin: 0;

<body>
    <button id="btn1" style="opacity: 0; pointer-events: auto;">Interactive Now Changed</button>

        <div style="width: 200px; height: 200px;">Huge child</div>
    </div>

    <section aria-label="test-ancestor">
        <button id="ok-btn">childbtn1</button>
        <button>childbtn2</button>

    <!-- Occlusion Test -->
    <div style="position: relative; width: 100px; height: 30px;">
        <button id="obscured-btn" style="position: absolute; top:0; left: 0; width: 100px; height: 30px;">Click Me</button>
        <div id="blocker" style="position: absolute; top:0; left: 0; width: 100px; height: 30px; background: red; z-index: 100;"></div>
    </div>

    <!-- Script for Events, Console, and Network -->
    <script>
        const btn = document.getElementById('ok-btn');
        if (btn) {
            btn.addEventListener('click', () => { console.log("clicked"); });
            btn.addEventListener('mouseenter', () => {});
        }

        console.error("Test console error");

        fetch('https://jsonplaceholder.typicode.com/todos/999999').catch(() => {});

</html>
